name: Fermi env testing
run-name: "Testing Conda Ferm env outside of the bottle - ${{ inputs.matrix_os }}"
on:
  workflow_call:
    inputs:
      matrix_os:
        required: true
        type: string
        description: "matrix.os to be ran"
      build_label:
        required: true
        type: string
        description: "Fermitools package build label"
      env_file:
        required: true
        type: string
        description: "Fermitools conda env file to run"


jobs:
  test:
    runs-on: ${{ inputs.matrix_os }}
    continue-on-error: true # Default false is to fail at first error
    name: "Testing Conda Fermi - ${{ inputs.matrix_os }} " 
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - name: Create FB_TESTING
        id: create_fb_testing 
        run: |
          mkdir -p ${{ github.workspace }}/FB_TESTING
          cd ${{ github.workspace }}/FB_TESTING/
          mkdir -p ${{ github.workspace }}/FB_TESTING/gdt-fermi
          mkdir -p ${{ github.workspace }}/FB_TESTING/fermi-summer-school
          mkdir -p ${{ github.workspace }}/FB_TESTING/AnalysisThreads
          mkdir -p ${{ github.workspace }}/FB_TESTING/ScienceTools
          pwd
          ls -l 
          echo "We are here"

      - name: Checkout Fermitools  repo 
        uses: actions/checkout@v6
        with:
          ref: ${{github.ref_name}} #reset_checkout_fixes checkout_fixes master

      - name: Checkout gbm Repo
        uses: actions/checkout@v6
        with:
          repository: USRA-STI/gdt-fermi
          path: FB_TESTING/gdt-fermi

      - name: Checkout Summer School Repo
        uses: actions/checkout@v6
        with:
          repository: FermiSummerSchool/fermi-summer-school
          path: FB_TESTING/fermi-summer-school

      - name: Checkout Analysis Repo
        uses: actions/checkout@v6
        with:
          repository: fermi-lat/AnalysisThreads
          path: FB_TESTING/AnalysisThreads

      - name: Checkout Science Tools
        uses: actions/checkout@v6
        with:
          repository: fermi-lat/ScienceTools
          path: FB_TESTING/ScienceTools

      - name: Checkout FB_TESTING
        id: checkout_fb_testing
        run: |
          pwd
          ls -l FB_TESTING/
          echo "Checkout here"

      - name: Conda environment creation and activation
        uses: conda-incubator/setup-miniconda@v3
        with:
          conda-remove-defaults: true
          python-version: 3.11
          activate-environment: test_fermi_env
          environment-file: docker/${{inputs.env_file}}
          auto-update-conda: false
          auto-activate-base: false
          show-channel-urls: true

  # Currently, every conda  build package has to be uploaded to Anaconda, so the package name can be passed onto this workflow.
  # It's a bug on the build actions team to fix. The alternative is to upload it as an artifact to Github server, and pass that reference around instead.
  # So this code is being kept around , just in case we want to pivot: 

      # - name: Download Conda package artifact
      #  uses: actions/download-artifact@v4
      #  with:
      #    name: "${{ matrix.os }}-fermitools-package"
      #    path: downloaded-package # Directory where the artifact will be downloaded

      # BUG: This doesn't handle Tags RC and MAIN, it will only pull from tag dev.
      - name: Test Realtime_execution_R  Notebooks pkg.
        id: test_realtime_execution_r_nb_fermi
        if: ${{ !cancelled() }}
        run: |
          # conda list
          echo "Run fermi env realtime execution R* tests on branch ${{ github.ref_name }}"
          mkdir -p ${{ github.workspace }}/FB_TESTING/realtime-execution/
          cd ${{ github.workspace }}/FB_TESTING/realtime-execution/
          wget https://fermi.gsfc.nasa.gov/ssc/data/analysis/scitools/data/SummerSchool/Likelihood_rxj1713.tgz
          wget https://fermi.gsfc.nasa.gov/ssc/data/analysis/scitools/data/SummerSchool/Likelihood_rcw103.tgz
          tar -xvf Likelihood_rxj1713.tgz
          cd Likelihood_rxj1713/
          pytest --nbmake -n auto --nbmake-timeout=6000 --junitxml=${{ github.workspace }}/FB_TESTING/test_results/ss_real_exe_rxj1713_result.xml -vv Realtime_execution_RXJ1713.ipynb 
          cd ../
          tar -xvf Likelihood_rcw103.tgz
          cd Likelihood_rcw103/
          pytest --nbmake -n auto --nbmake-timeout=6000 --junitxml=${{ github.workspace }}/FB_TESTING/test_results/ss_real_exe_rcw103_result.xml -vv Realtime_execution_RCW103.ipynb
        continue-on-error: true  # Job keeps going even if tests fail
 
      # BUG: This doesn't handle Tags RC and MAIN, it will only pull from tag dev. 
      - name: Test Subset fermi-summer-school  Notebooks pkg.
        id: test_summer_school_nb_fermi
        run: |
          # conda list
          echo "Run fermi env fermi-summer-school tests on branch ${{ github.ref_name }}"
          cd /shared/fermi-summer-school/Likelihood_Advanced/
          wget https://fermi.gsfc.nasa.gov/science/mtgs/summerschool/2021/fermipyTutorialData.tgz
          tar xf fermipyTutorialData.tgz
          cd ${{ github.workspace }}/FB_TESTING/fermi-summer-school/
          # 2 nbs  
          pytest --nbmake -n auto --nbmake-timeout=3000 --junitxml=${{ github.workspace }}/FB_TESTING/test_results/fss_data_exploration_result.xml -vv Data_Exploration/*.ipynb 
          # 4 NBs
          pytest --nbmake -n auto --nbmake-timeout=3000 --junitxml=${{ github.workspace }}/FB_TESTING/test_results/fss_like_adv_fermipy_result.xml -vv Likelihood_Advanced/Likelihood\ With\ fermiPy.ipynb
          pytest --nbmake -n auto --nbmake-timeout=3000 --junitxml=${{ github.workspace }}/FB_TESTING/test_results/fss_like_adv_curvature_result.xml -vv Likelihood_Advanced/Curvature\ Test.ipynb  
          pytest --nbmake -n auto --nbmake-timeout=3000 --junitxml=${{ github.workspace }}/FB_TESTING/test_results/fss_like_adv_lightcurve_result.xml -vv Likelihood_Advanced/Lightcurve.ipynb 
          pytest --nbmake -n auto --nbmake-timeout=3000 --junitxml=${{ github.workspace }}/FB_TESTING/test_results/fss_like_adv_sed_result.xml -vv Likelihood_Advanced/SED\ Stuff.ipynb

          ##No  pytest --nbmake -n auto --nbmake-timeout=3000 --junitxml=${{ github.workspace }}/FB_TESTING/test_results/fss_find_source_result.xml -vv  Advanced_Topics/FindSource/*.ipynb 
          # Need these too:
          # https://fermi.gsfc.nasa.gov/ssc/dev/tutorials/Likelihood_rcw103.tgz
          # https://fermi.gsfc.nasa.gov/ssc/dev/tutorials/Likelihood_rxj1713.tgz
        continue-on-error: true  # Job keeps going even if tests fail

      - name: Test SourceAnalysis  Notebooks pkg.
        id: test_source_analysis_nb_fermi
        # continue-on-error: ${{ fromJSON(vars.CONTINUE_ON_ERROR || 'false') }}  # Default is to fail at first error
        run: |
          conda list
          echo "Run fermi env source_analysis_nb tests on branch ${{ github.ref_name }}"
          # cd ${{ github.workspace }}/FB_TESTING/AnalysisThreads/SourceAnalysis
          # pytest --nbmake -n auto --nbmake-timeout=3000 --junitxml=${{ github.workspace }}/FB_TESTING/test_results/esa6_result.xml -vv 6.ExtendedSourceAnalysis/*.ipynb
          # pytest --nbmake -n auto --nbmake-timeout=10000 --junitxml=${{ github.workspace }}/FB_TESTING/test_results/ulh2_result.xml -vv 2.UnbinnedLikelihood/*.ipynb
          # pytest --nbmake -n auto --nbmake-timeout=3000 --junitxml=${{ github.workspace }}/FB_TESTING/test_results/pul5_result.xml -vv 5.PythonUpperLimits/*.ipynb
          # pytest --nbmake -n auto --nbmake-timeout=3000 --junitxml=${{ github.workspace }}/FB_TESTING/test_results/pg8_results.xml -vv  8.PulsarGating/*.ipynb
          # pytest --nbmake -n auto --nbmake-timeout=3000 --junitxml=${{ github.workspace }}/FB_TESTING/test_results/blh1_result.xml -vv 1.BinnedLikelihood/*.ipynb
          # pytest --nbmake -n auto --nbmake-timeout=3000 --junitxml=${{ github.workspace }}/FB_TESTING/test_results/plh3_result.xml -vv 3.PythonLikelihood/*.ipynb
          # pytest --nbmake -n auto --nbmake-timeout=3000 --junitxml=${{ github.workspace }}/FB_TESTING/test_results/splh4_result.xml -vv 4.SummedPythonLikelihood/*.ipynb
          # pytest --nbmake -n auto --nbmake-timeout=3000 --junitxml=${{ github.workspace }}/FB_TESTING/test_results/lap7_result.xml -vv 7.LATAperturePhotometry/*.ipynb
          # pytest --nbmake -n auto --nbmake-timeout=5000 --junitxml=${{ github.workspace }}/FB_TESTING/test_results/ed10_result.xml -vv 10.EnergyDispersion/*.ipynb
        continue-on-error: true  # Job keeps going even if tests fail

      - name: Test fermipy with latest Fermitools conda pkg.
        id: test_fermi
        # continue-on-error: ${{ fromJSON(vars.CONTINUE_ON_ERROR || 'false') }}  # Default is to fail at first error
        run: |
          echo "Run fermi env tests on branch ${{ github.ref_name }}"
          ls -l ${{ github.workspace }}/FB_TESTING/
          cd ${{ github.workspace }}/FB_TESTING/
          ${{ github.workspace }}/FB_TESTING/ScienceTools/recipe/tests/ST-unit-test -w -d -v
          ${{ github.workspace }}/FB_TESTING/ScienceTools/recipe/tests/ST-AGN-thread-test -w -d -v
          # Run Fermipy's tests and save them so they can be reported on the dashboard.
          pytest -n auto --junitxml=fermipy_results.xml -vv --pyargs fermipy
          pytest -n auto --junitxml=threeml_results.xml -vv --pyargs threeML
        continue-on-error: true  # Job keeps going even if tests fail

      # The layout for this reporting action works. Not sure if there is something better, but it does a good job for us.
      - name: Publish Test Results Linux
        uses: EnricoMi/publish-unit-test-result-action/linux@v2
        if: runner.os == 'Linux'
        with:
          check_name: "Test Results: Fermipy ${{ inputs.matrix_os }}"
          files: |
             ${{ github.workspace }}/FB_TESTING/test_results/*.xml
             !${{ github.workspace }}/FB_TESTING/test_results/myDoc.xml
    
      - name: Publish Test Results OSX
        uses: EnricoMi/publish-unit-test-result-action/macos@v2
        if: runner.os == 'macOS'
        with:
          check_name: "Test Results: Fermi env ${{ inputs.matrix_os }}"
          files: |
             ${{ github.workspace }}/FB_TESTING/test_results/*.xml
             !${{ github.workspace }}/FB_TESTING/test_results/myDoc.xml
