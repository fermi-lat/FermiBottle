name: fermibottle ci Multi-Arch Build
on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - '**.md'
      - .clang-format
      - .dockerignore
      - .gitignore
      - docker-compose.yml
      - Dockerfile
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'

env:
  TEST_TAG: fssc/fermibottle_lite
  LATEST_TAG: fermi-lat/fermibottle2026:latest

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch_full: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - arch_full: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm # Use native ARM runners for better performance
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set tag 
        run: |
           echo "\"DOCKER_TAG=$(date +'%m-%d-%Y')\" >> $GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          # registry: ghcr.io


      - name: Check inside
        id: confirm_inside_env
        run: |
           echo "look around  jsa"
           pwd
           ls -l
           # ls -l ${{ github.workspace }}/FermiBottle/docker
           ls -l ${{ github.workspace }}/docker

      - name: Build and Push Architecture-Specific Image
        uses: docker/build-push-action@v7
        with:
          context: docker
          platforms: ${{ matrix.arch_full }} # linux/${{ matrix.arch }}
          push: true
          load: true
          tags: "${{ env.TEST_TAG }}:${{ env.DOCKER_TAG}}-${{ matrix.arch }}"
          #  ghcr.io/${{ github.repository }}/${{ env.TEST_TAG }}-${{ matrix.arch }}
          # tags: ${{ env.TEST_TAG }}          

      - name: Run Test script in container
        # -v mounts the current workspace to /app inside the container
        # -w sets the working directory inside the container
        run: |
          docker run \
            -w /home/fermi \
            "${{ env.TEST_TAG }}:${{ env.DOCKER_TAG}}" \
            sh ./test_fermibottle.sh

      # The layout for this reporting action works. Not sure if there is something better, but it does a good job for us.
      - name: Publish Test Results Linux
        uses: EnricoMi/publish-unit-test-result-action/linux@v2
        if: runner.os == 'Linux'
        with:
          check_name: "Test Results: Fermipy ${{ matrix.arch_full }}"
          files: | 
             ${{ github.workspace }}/FB_TESTING/test_results/*.xml
             !${{ github.workspace }}/FB_TESTING/test_results/myDoc.xml
          
      - name: Publish Test Results OSX
        uses: EnricoMi/publish-unit-test-result-action/macos@v2
        if: runner.os == 'macOS'
        with:
          check_name: "Test Results: Fermi env ${{ matrix.arch_full }}"
          files: |
             ${{ github.workspace }}/FB_TESTING/test_results/*.xml
             !${{ github.workspace }}/FB_TESTING/test_results/myDoc.xml

  merge:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          # registry: ghcr.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create Multi-Arch Manifest
        run: |
          # ghcr.io/${{ github.repository }}/${{ env.TEST_TAG }}-amd64 \ ghcr.io/${{ github.repository }}/${{ env.TEST_TAG }}-arm64 
          docker buildx imagetools create -t "${{ env.TEST_TAG }}:${{ env.DOCKER_TAG}}" \
            "${{ env.TEST_TAG }}:${{ env.DOCKER_TAG}}-amd64" \
            "${{ env.TEST_TAG }}:${{ env.DOCKER_TAG}}-arm64"
