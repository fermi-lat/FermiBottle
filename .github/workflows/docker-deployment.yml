name: fermibottle ci Multi-Arch Build
on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - '**.md'
      - .clang-format
      - .dockerignore
      - .gitignore
      - docker-compose.yml
      - Dockerfile
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'

env:
  TEST_TAG: fssc/fermibottle_lite:0514
  LATEST_TAG: fssc/fermibottle:2026

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch_full: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - arch_full: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm # Use native ARM runners for better performance
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          # registry: ghcr.io


      - name: Check inside
        id: confirm_inside_env
        run: |
           echo "look around  jsa"
           pwd
           ls -l
           # ls -l ${{ github.workspace }}/FermiBottle/docker
           ls -l ${{ github.workspace }}/docker
           # echo "docker tag ${{ env.DATE}}"
           # echo "docker tag $DATE"

      - name: Build and Push Architecture-Specific Image
        uses: docker/build-push-action@v7
        with:
          context: docker
          platforms: ${{ matrix.arch_full }} # linux/${{ matrix.arch }}
          push: true
          tags: ${{ env.TEST_TAG }}-${{ matrix.arch }}
          # load: true
          #  ghcr.io/${{ github.repository }}/${{ env.TEST_TAG }}-${{ matrix.arch }}
          # tags: ${{ env.TEST_TAG }}          

  merge:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create Multi-Arch Manifest
        run: |
          docker buildx imagetools create -t ${{ env.TEST_TAG }} \
            ${{ env.TEST_TAG }}-amd64 \
            ${{ env.TEST_TAG }}-arm64
